<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Luu Travels & Logistics</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #111C5A 0%, #0A1240 100%);
            padding: 100px 20px 60px;
        }

        .auth-container {
            background: white;
            border-radius: 12px;
            padding: 45px 40px 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-logo {
            display: block;
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #F5A623;
            padding: 3px;
        }

        .auth-container h2 {
            text-align: center;
            color: #111C5A;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            text-align: center;
            color: #8888A8;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #1A1A2E;
            font-size: 0.9rem;
        }

        .form-group label .required {
            color: #DC3545;
            margin-left: 2px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 11px 16px;
            border: 2px solid #E8E8F0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #F5A623;
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.1);
        }

        .form-group .input-hint {
            font-size: 0.8rem;
            color: #8888A8;
            margin-top: 4px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            background: #F5A623;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .btn-auth:hover {
            background: #D4941A;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(245, 166, 35, 0.4);
        }

        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.95rem;
            color: #555;
        }

        .auth-links a {
            color: #F5A623;
            font-weight: 600;
            text-decoration: none;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #DC3545;
            margin-top: 15px;
            display: none;
            text-align: center;
            padding: 10px;
            background: rgba(220, 53, 69, 0.1);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #28A745;
            margin-top: 15px;
            display: none;
            text-align: center;
            padding: 10px;
            background: rgba(40, 167, 69, 0.1);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .success-message.show {
            display: block;
        }

        .terms {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 15px 0;
        }

        .terms input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #F5A623;
            cursor: pointer;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .terms label {
            font-size: 0.85rem;
            color: #555;
            cursor: pointer;
            line-height: 1.5;
        }

        .terms label a {
            color: #F5A623;
            text-decoration: none;
        }

        .terms label a:hover {
            text-decoration: underline;
        }

        .password-strength {
            height: 4px;
            border-radius: 2px;
            background: #E8E8F0;
            margin-top: 6px;
            overflow: hidden;
        }

        .password-strength .strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .password-strength .strength-bar.weak {
            width: 25%;
            background: #DC3545;
        }

        .password-strength .strength-bar.medium {
            width: 50%;
            background: #FFC107;
        }

        .password-strength .strength-bar.strong {
            width: 75%;
            background: #28A745;
        }

        .password-strength .strength-bar.very-strong {
            width: 100%;
            background: #28A745;
        }

        .strength-text {
            font-size: 0.75rem;
            color: #8888A8;
            margin-top: 3px;
        }

        /* ===== ID/PASSPORT TOGGLE ===== */
        .id-toggle-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            background: #F8F9FA;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #E8E8F0;
        }

        .id-toggle-btn {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid transparent;
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            color: #8888A8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .id-toggle-btn:hover {
            background: rgba(245, 166, 35, 0.05);
        }

        .id-toggle-btn.active {
            border-color: #F5A623;
            background: white;
            color: #111C5A;
            box-shadow: 0 2px 8px rgba(245, 166, 35, 0.15);
        }

        .id-toggle-btn .icon {
            font-size: 1.2rem;
            display: block;
            margin-bottom: 2px;
        }

        .id-input-container {
            position: relative;
        }

        .id-input-container .input-hint {
            font-size: 0.8rem;
            color: #8888A8;
            margin-top: 4px;
        }

        .id-input-container .validation-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            display: none;
        }

        .id-input-container .validation-icon.valid {
            display: block;
            color: #28A745;
        }

        .id-input-container .validation-icon.invalid {
            display: block;
            color: #DC3545;
        }

        .id-input-container input.valid {
            border-color: #28A745;
        }

        .id-input-container input.invalid {
            border-color: #DC3545;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 30px 20px;
            }

            .auth-container h2 {
                font-size: 1.5rem;
            }

            .auth-logo {
                width: 60px;
                height: 60px;
            }

            .id-toggle-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <img src="../assets/logo.png" alt="Luu Travels" class="nav-logo">
                <span class="brand-text">Luu <span>Travels</span></span>
            </div>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="../index.html#services">Services</a>
                <a href="../index.html#about">About</a>
                <a href="../index.html#contact">Contact</a>
                <button class="btn-login" onclick="window.location.href='login.html'">Login</button>
                <button class="btn-register" style="display:none;">Register</button>
            </div>
            <button class="hamburger" id="hamburger">☰</button>
        </div>
    </nav>

    <!-- Register Section -->
    <section class="auth-section">
        <div class="auth-container">
            <img src="../assets/logo.png" alt="Luu Travels" class="auth-logo">
            <h2>Create Account</h2>
            <p class="auth-subtitle">Join Luu Travels and start booking your journeys</p>

            <form id="registerForm">
                <!-- Full Name -->
                <div class="form-group">
                    <label for="registerFullName">Full Name <span class="required">*</span></label>
                    <input type="text" id="registerFullName" placeholder="Enter your full name" required>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="registerEmail">Email Address <span class="required">*</span></label>
                    <input type="email" id="registerEmail" placeholder="Enter your email" required autocomplete="email">
                </div>

                <!-- Phone -->
                <div class="form-group">
                    <label for="registerPhone">Phone Number <span class="required">*</span></label>
                    <input type="tel" id="registerPhone" placeholder="Enter 10-digit phone number" required>
                    <div class="input-hint">e.g., 0712345678</div>
                </div>

                <!-- ID/Passport Toggle -->
                <div class="form-group">
                    <label>Identification Type <span class="required">*</span></label>
                    <div class="id-toggle-container">
                        <button type="button" class="id-toggle-btn active" data-type="id" id="idToggleBtn">
                            <span class="icon">🪪</span>
                            South African ID
                        </button>
                        <button type="button" class="id-toggle-btn" data-type="passport" id="passportToggleBtn">
                            <span class="icon">🛂</span>
                            Passport
                        </button>
                    </div>
                </div>

                <!-- ID/Passport Number Input -->
                <div class="form-group">
                    <label for="registerIdNumber" id="idLabel">ID Number <span class="required">*</span></label>
                    <div class="id-input-container">
                        <input type="text" id="registerIdNumber" placeholder="Enter 13-digit ID number" required>
                        <span class="validation-icon" id="validationIcon"></span>
                    </div>
                    <div class="input-hint" id="idHint">13-digit South African ID number</div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="registerPassword">Password <span class="required">*</span></label>
                    <input type="password" id="registerPassword" placeholder="Create a password (min 6 characters)" required>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label for="registerConfirmPassword">Confirm Password <span class="required">*</span></label>
                    <input type="password" id="registerConfirmPassword" placeholder="Confirm your password" required>
                </div>

                <!-- Terms -->
                <div class="terms">
                    <input type="checkbox" id="termsCheck" required>
                    <label for="termsCheck">
                        I agree to the <a href="#" onclick="alert('Terms and Conditions will be displayed here')">Terms and Conditions</a> 
                        and <a href="#" onclick="alert('Privacy Policy will be displayed here')">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn-auth" id="registerBtnSubmit">Create Account</button>
            </form>

            <div class="error-message" id="registerError"></div>
            <div class="success-message" id="registerSuccess"></div>

            <div class="auth-links">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Luu Travels & Logistics. Moving People. Delivering Trust.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ===== SUPABASE CONFIGURATION =====
        const SUPABASE_CONFIG = {
            url: 'https://gwzpzvwermsfnputttdo.supabase.co',
            anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3enB6dndlcm1zZm5wdXR0dGRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNzkxODYsImV4cCI6MjA5Nzk1NTE4Nn0.y4v8P0TxS4yfjj9DfWF_l1B8OBSl_ybv4vZBuVUN7Oc'
        };

        const supabase = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);

        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('registerForm');
            const registerBtn = document.getElementById('registerBtnSubmit');
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            const passwordInput = document.getElementById('registerPassword');
            const confirmPasswordInput = document.getElementById('registerConfirmPassword');
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');

            // ID/Passport toggle elements
            const idToggleBtn = document.getElementById('idToggleBtn');
            const passportToggleBtn = document.getElementById('passportToggleBtn');
            const idInput = document.getElementById('registerIdNumber');
            const idLabel = document.getElementById('idLabel');
            const idHint = document.getElementById('idHint');
            const validationIcon = document.getElementById('validationIcon');

            let selectedType = 'id'; // 'id' or 'passport'

            // ========================================
            // ID/PASSPORT TOGGLE
            // ========================================
            function toggleIdType(type) {
                selectedType = type;

                // Update button styles
                idToggleBtn.classList.remove('active');
                passportToggleBtn.classList.remove('active');

                if (type === 'id') {
                    idToggleBtn.classList.add('active');
                    idLabel.textContent = 'ID Number *';
                    idInput.placeholder = 'Enter 13-digit ID number';
                    idHint.textContent = '13-digit South African ID number';
                    idInput.maxLength = 13;
                    idInput.pattern = '[0-9]{13}';
                    idInput.value = '';
                } else {
                    passportToggleBtn.classList.add('active');
                    idLabel.textContent = 'Passport Number *';
                    idInput.placeholder = 'Enter passport number';
                    idHint.textContent = 'Enter your passport number (e.g., A1234567)';
                    idInput.maxLength = 20;
                    idInput.pattern = '[A-Z0-9]{6,20}';
                    idInput.value = '';
                }

                // Clear validation
                idInput.classList.remove('valid', 'invalid');
                validationIcon.className = 'validation-icon';
                validationIcon.textContent = '';
            }

            // ID toggle button click
            idToggleBtn.addEventListener('click', function() {
                toggleIdType('id');
            });

            // Passport toggle button click
            passportToggleBtn.addEventListener('click', function() {
                toggleIdType('passport');
            });

            // ========================================
            // ID/PASSPORT VALIDATION
            // ========================================
            idInput.addEventListener('input', function() {
                const value = this.value.trim();
                let isValid = false;

                if (selectedType === 'id') {
                    // ID: 13 digits only
                    isValid = /^[0-9]{13}$/.test(value);
                } else {
                    // Passport: 6-20 alphanumeric characters
                    isValid = /^[A-Z0-9]{6,20}$/i.test(value);
                }

                if (value.length === 0) {
                    this.classList.remove('valid', 'invalid');
                    validationIcon.className = 'validation-icon';
                    validationIcon.textContent = '';
                } else if (isValid) {
                    this.classList.remove('invalid');
                    this.classList.add('valid');
                    validationIcon.className = 'validation-icon valid';
                    validationIcon.textContent = '✓';
                } else {
                    this.classList.remove('valid');
                    this.classList.add('invalid');
                    validationIcon.className = 'validation-icon invalid';
                    validationIcon.textContent = '✗';
                }
            });

            // ========================================
            // PASSWORD STRENGTH
            // ========================================
            passwordInput.addEventListener('input', function() {
                const password = this.value;
                const strength = checkPasswordStrength(password);
                
                strengthBar.className = 'strength-bar';
                if (password.length === 0) {
                    strengthBar.style.width = '0';
                    strengthText.textContent = '';
                    return;
                }

                if (strength.score <= 1) {
                    strengthBar.classList.add('weak');
                    strengthText.textContent = 'Weak password';
                    strengthText.style.color = '#DC3545';
                } else if (strength.score === 2) {
                    strengthBar.classList.add('medium');
                    strengthText.textContent = 'Medium password';
                    strengthText.style.color = '#FFC107';
                } else if (strength.score === 3) {
                    strengthBar.classList.add('strong');
                    strengthText.textContent = 'Strong password';
                    strengthText.style.color = '#28A745';
                } else {
                    strengthBar.classList.add('very-strong');
                    strengthText.textContent = 'Very strong password';
                    strengthText.style.color = '#28A745';
                }
            });

            function checkPasswordStrength(password) {
                let score = 0;
                if (password.length >= 6) score++;
                if (password.length >= 10) score++;
                if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
                if (/\d/.test(password)) score++;
                if (/[^a-zA-Z0-9]/.test(password)) score++;
                return { score: Math.min(score, 4) };
            }

            // ========================================
            // CONFIRM PASSWORD VALIDATION
            // ========================================
            confirmPasswordInput.addEventListener('input', function() {
                if (this.value && this.value !== passwordInput.value) {
                    this.style.borderColor = '#DC3545';
                } else {
                    this.style.borderColor = '#E8E8F0';
                }
            });

            // ========================================
            // FORM SUBMISSION
            // ========================================
            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const fullName = document.getElementById('registerFullName').value.trim();
                const email = document.getElementById('registerEmail').value.trim();
                const phone = document.getElementById('registerPhone').value.trim();
                const idValue = idInput.value.trim();
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                const termsChecked = document.getElementById('termsCheck').checked;

                // Clear previous messages
                errorDiv.classList.remove('show');
                errorDiv.textContent = '';
                successDiv.classList.remove('show');
                successDiv.textContent = '';

                // Validate inputs
                if (!fullName || !email || !phone || !idValue || !password) {
                    errorDiv.textContent = 'Please fill in all required fields';
                    errorDiv.classList.add('show');
                    return;
                }

                if (password !== confirmPassword) {
                    errorDiv.textContent = 'Passwords do not match';
                    errorDiv.classList.add('show');
                    return;
                }

                if (password.length < 6) {
                    errorDiv.textContent = 'Password must be at least 6 characters long';
                    errorDiv.classList.add('show');
                    return;
                }

                if (!/^[0-9]{10}$/.test(phone.replace(/\s/g, ''))) {
                    errorDiv.textContent = 'Please enter a valid 10-digit phone number';
                    errorDiv.classList.add('show');
                    return;
                }

                // Validate ID/Passport
                if (selectedType === 'id') {
                    if (!/^[0-9]{13}$/.test(idValue)) {
                        errorDiv.textContent = 'Please enter a valid 13-digit ID number';
                        errorDiv.classList.add('show');
                        return;
                    }
                } else {
                    if (!/^[A-Z0-9]{6,20}$/i.test(idValue)) {
                        errorDiv.textContent = 'Please enter a valid passport number (6-20 alphanumeric characters)';
                        errorDiv.classList.add('show');
                        return;
                    }
                }

                if (!termsChecked) {
                    errorDiv.textContent = 'Please agree to the Terms and Conditions';
                    errorDiv.classList.add('show');
                    return;
                }

                // Show loading state
                const originalText = registerBtn.textContent;
                registerBtn.textContent = 'Creating account...';
                registerBtn.disabled = true;

                try {
                    // 1. Sign up with Supabase Auth
                    const { data: authData, error: authError } = await supabase.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: {
                                full_name: fullName,
                                phone: phone,
                                id_type: selectedType
                            }
                        }
                    });

                    if (authError) {
                        throw authError;
                    }

                    if (!authData.user) {
                        throw new Error('Failed to create user account');
                    }

                    // 2. Save user profile to users table
                    const userData = {
                        id: authData.user.id,
                        email: email,
                        full_name: fullName,
                        phone: phone,
                        id_number: selectedType === 'id' ? idValue : null,
                        passport_number: selectedType === 'passport' ? idValue : null,
                        role: 'customer'
                    };

                    const { error: profileError } = await supabase
                        .from('users')
                        .insert([userData]);

                    if (profileError) {
                        console.error('Profile save error:', profileError);
                        // Don't throw here - user is created, just log the error
                    }

                    successDiv.textContent = 'Registration successful! Please check your email to verify your account.';
                    successDiv.classList.add('show');
                    registerForm.reset();
                    strengthBar.style.width = '0';
                    strengthText.textContent = '';
                    idInput.classList.remove('valid', 'invalid');
                    validationIcon.className = 'validation-icon';
                    validationIcon.textContent = '';

                    // Reset to ID type
                    toggleIdType('id');

                    // Redirect to login after 3 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);

                } catch (error) {
                    console.error('Registration error:', error);
                    errorDiv.textContent = error.message || 'Registration failed. Please try again.';
                    errorDiv.classList.add('show');
                    registerBtn.textContent = originalText;
                    registerBtn.disabled = false;
                }
            });

            // ========================================
            // CHECK IF ALREADY LOGGED IN
            // ========================================
            supabase.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    window.location.href = 'dashboard.html';
                }
            });
        });
    </script>
</body>
</html>
