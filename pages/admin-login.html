<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Luu Travels & Logistics</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a3c5e 0%, #0f2a42 100%);
            padding: 20px;
        }

        .admin-login-container {
            width: 100%;
            max-width: 420px;
        }

        .admin-login-box {
            background: white;
            padding: 45px 40px 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {
            display: block;
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #f5a623;
            padding: 3px;
        }

        .admin-login-box h2 {
            text-align: center;
            color: #1a3c5e;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .login-subtitle {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #f5a623;
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.1);
        }

        .form-group .input-hint {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
        }

        .btn-login-admin {
            width: 100%;
            padding: 14px;
            background: #f5a623;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .btn-login-admin:hover {
            background: #d4941a;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(245, 166, 35, 0.4);
        }

        .btn-login-admin:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #dc3545;
            margin-top: 15px;
            display: none;
            text-align: center;
            padding: 10px;
            background: rgba(220, 53, 69, 0.1);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
        }

        .back-link a {
            color: #f5a623;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .admin-badge {
            display: inline-block;
            background: #f5a623;
            color: white;
            padding: 2px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .security-note {
            background: #f8f9fa;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            color: #888;
            margin-top: 20px;
            text-align: center;
            border: 1px solid #eee;
        }

        @media (max-width: 480px) {
            .admin-login-box {
                padding: 30px 20px;
            }

            .admin-login-box h2 {
                font-size: 1.3rem;
            }

            .login-logo {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-box">
            <img src="../assets/logo.png" alt="Luu Travels" class="login-logo">
            <div style="text-align:center;">
                <span class="admin-badge">🔐 Admin Access</span>
            </div>
            <h2>Admin Login</h2>
            <p class="login-subtitle">Access the administration panel</p>

            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="adminEmail">Email Address</label>
                    <input type="email" id="adminEmail" value="princemahapa20@gmail.com" required autocomplete="email">
                    <div class="input-hint">Enter your admin email</div>
                </div>

                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" value="Prince@2001" required autocomplete="current-password">
                    <div class="input-hint">Enter your admin password</div>
                </div>

                <button type="submit" class="btn-login-admin" id="adminLoginBtn">Login to Admin Panel</button>
            </form>

            <div class="error-message" id="loginError"></div>

            <div class="security-note">
                🔒 This area is restricted to authorized administrators only.
            </div>

            <div class="back-link">
                <a href="../index.html">← Back to Homepage</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Admin credentials from config
        const ADMIN_CREDENTIALS = {
            email: 'princemahapa20@gmail.com',
            password: 'Prince@2001'
        };

        // Supabase configuration
        const SUPABASE_CONFIG = {
            url: 'https://gwzpzvwermsfnputttdo.supabase.co',
            anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3enB6dndlcm1zZm5wdXR0dGRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNzkxODYsImV4cCI6MjA5Nzk1NTE4Nn0.y4v8P0TxS4yfjj9DfWF_l1B8OBSl_ybv4vZBuVUN7Oc'
        };

        const supabase = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);

        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('adminLoginForm');
            const loginBtn = document.getElementById('adminLoginBtn');
            const errorDiv = document.getElementById('loginError');

            // Check if already logged in
            supabase.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    const user = session.user;
                    if (user.email === ADMIN_CREDENTIALS.email) {
                        window.location.href = 'admin-dashboard.html';
                    }
                }
            });

            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('adminEmail').value;
                const password = document.getElementById('adminPassword').value;

                // Clear previous error
                errorDiv.classList.remove('show');
                errorDiv.textContent = '';

                // Validate
                if (!email || !password) {
                    errorDiv.textContent = 'Please fill in all fields';
                    errorDiv.classList.add('show');
                    return;
                }

                // Show loading
                const originalText = loginBtn.textContent;
                loginBtn.textContent = 'Logging in...';
                loginBtn.disabled = true;

                try {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });

                    if (error) {
                        throw error;
                    }

                    // Check if user is admin
                    if (data.user.email !== ADMIN_CREDENTIALS.email) {
                        await supabase.auth.signOut();
                        throw new Error('Unauthorized access. This account does not have admin privileges.');
                    }

                    // Login successful - redirect to admin dashboard
                    window.location.href = 'admin-dashboard.html';

                } catch (error) {
                    errorDiv.textContent = error.message || 'Login failed. Please check your credentials.';
                    errorDiv.classList.add('show');
                    loginBtn.textContent = originalText;
                    loginBtn.disabled = false;
                }
            });

            // Auto-fill with admin credentials on focus
            document.getElementById('adminEmail').addEventListener('focus', function() {
                if (!this.value) {
                    this.value = ADMIN_CREDENTIALS.email;
                }
            });

            document.getElementById('adminPassword').addEventListener('focus', function() {
                if (!this.value) {
                    this.value = ADMIN_CREDENTIALS.password;
                }
            });
        });
    </script>
</body>
</html>
