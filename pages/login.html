<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Luu Travels & Logistics</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #111C5A 0%, #0A1240 100%);
            padding: 100px 20px 60px;
        }

        .auth-container {
            background: white;
            border-radius: 12px;
            padding: 45px 40px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-logo {
            display: block;
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #F5A623;
            padding: 3px;
        }

        .auth-container h2 {
            text-align: center;
            color: #111C5A;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            text-align: center;
            color: #8888A8;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #1A1A2E;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E8E8F0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #F5A623;
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.1);
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            background: #F5A623;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .btn-auth:hover {
            background: #D4941A;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(245, 166, 35, 0.4);
        }

        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.95rem;
            color: #555;
        }

        .auth-links a {
            color: #F5A623;
            font-weight: 600;
            text-decoration: none;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #DC3545;
            margin-top: 15px;
            display: none;
            text-align: center;
            padding: 10px;
            background: rgba(220, 53, 69, 0.1);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: #28A745;
            margin-top: 15px;
            display: none;
            text-align: center;
            padding: 10px;
            background: rgba(40, 167, 69, 0.1);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .success-message.show {
            display: block;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #F5A623;
            cursor: pointer;
        }

        .remember-me label {
            font-size: 0.9rem;
            color: #555;
            cursor: pointer;
        }

        .forgot-password {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        .forgot-password a {
            color: #8888A8;
            font-size: 0.85rem;
            text-decoration: none;
        }

        .forgot-password a:hover {
            color: #F5A623;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #8888A8;
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #E8E8F0;
        }

        .divider span {
            padding: 0 15px;
        }

        .admin-link {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #8888A8;
        }

        .admin-link a {
            color: #111C5A;
            font-weight: 600;
            text-decoration: none;
        }

        .admin-link a:hover {
            color: #F5A623;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 30px 20px;
            }

            .auth-container h2 {
                font-size: 1.5rem;
            }

            .auth-logo {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <img src="../assets/logo.png" alt="Luu Travels" class="nav-logo">
                <span class="brand-text">Luu <span>Travels</span></span>
            </div>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="../index.html#services">Services</a>
                <a href="../index.html#about">About</a>
                <a href="../index.html#contact">Contact</a>
                <button class="btn-login" style="display:none;">Login</button>
                <button class="btn-register" onclick="window.location.href='register.html'">Register</button>
            </div>
            <button class="hamburger" id="hamburger">☰</button>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="auth-section">
        <div class="auth-container">
            <img src="../assets/logo.png" alt="Luu Travels" class="auth-logo">
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Login to your account to book your journey</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>

                <button type="submit" class="btn-auth" id="loginBtnSubmit">Login</button>
            </form>

            <div class="error-message" id="loginError"></div>
            <div class="success-message" id="loginSuccess"></div>

            <div class="forgot-password">
                <a href="forgot-password.html">Forgot password?</a>
            </div>

            <div class="divider">
                <span>or</span>
            </div>

            <div class="auth-links">
                Don't have an account? <a href="register.html">Sign Up</a>
            </div>

            <div class="admin-link">
                🔐 <a href="admin-login.html">Admin Login</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Luu Travels & Logistics. Moving People. Delivering Trust.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ===== SUPABASE CONFIGURATION =====
        const SUPABASE_CONFIG = {
            url: 'https://gwzpzvwermsfnputttdo.supabase.co',
            anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd3enB6dndlcm1zZm5wdXR0dGRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNzkxODYsImV4cCI6MjA5Nzk1NTE4Nn0.y4v8P0TxS4yfjj9DfWF_l1B8OBSl_ybv4vZBuVUN7Oc'
        };

        const ADMIN_CREDENTIALS = {
            email: 'princemahapa20@gmail.com',
            password: 'Prince@2001'
        };

        const supabase = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);

        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtnSubmit');
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');

            // ========================================
            // CHECK IF ALREADY LOGGED IN
            // ========================================
            supabase.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    console.log('👤 User already logged in:', session.user.email);
                    if (session.user.email === ADMIN_CREDENTIALS.email) {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }
            });

            // ========================================
            // LOAD REMEMBERED EMAIL
            // ========================================
            const rememberedEmail = localStorage.getItem('rememberEmail');
            if (rememberedEmail) {
                document.getElementById('loginEmail').value = rememberedEmail;
                document.getElementById('rememberMe').checked = true;
            }

            // ========================================
            // FORM SUBMISSION
            // ========================================
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value;
                const rememberMe = document.getElementById('rememberMe').checked;

                // Clear previous messages
                errorDiv.classList.remove('show');
                errorDiv.textContent = '';
                successDiv.classList.remove('show');
                successDiv.textContent = '';

                // Validate
                if (!email || !password) {
                    errorDiv.textContent = 'Please fill in all fields';
                    errorDiv.classList.add('show');
                    return;
                }

                // Show loading
                const originalText = loginBtn.textContent;
                loginBtn.textContent = 'Logging in...';
                loginBtn.disabled = true;

                try {
                    console.log('🔑 Attempting to login:', email);

                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });

                    if (error) {
                        console.error('❌ Login error:', error);
                        throw error;
                    }

                    console.log('✅ Login successful:', data.user.email);

                    // Store remember me preference
                    if (rememberMe) {
                        localStorage.setItem('rememberEmail', email);
                    } else {
                        localStorage.removeItem('rememberEmail');
                    }

                    successDiv.textContent = '✅ Login successful! Redirecting...';
                    successDiv.classList.add('show');

                    // Redirect after delay
                    setTimeout(() => {
                        if (email === ADMIN_CREDENTIALS.email) {
                            window.location.href = 'admin-dashboard.html';
                        } else {
                            const redirectUrl = sessionStorage.getItem('redirectAfterLogin') || 'dashboard.html';
                            sessionStorage.removeItem('redirectAfterLogin');
                            window.location.href = redirectUrl;
                        }
                    }, 1500);

                } catch (error) {
                    console.error('❌ Login error:', error);
                    errorDiv.textContent = error.message || 'Login failed. Please check your credentials.';
                    errorDiv.classList.add('show');
                    loginBtn.textContent = originalText;
                    loginBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
